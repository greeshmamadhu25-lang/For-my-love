<div class="container">

    <h1>❤️ For My Baby ❤️</h1>

    <h2>Nishanth</h2>

    <p class="message">
        Hi Baby...
        <br><br>

        I know you're about to start a new chapter in your life.

        I can't always be beside you...

        But I can always be here.

        So I made this little world for you.

        Whenever you miss me,

        whenever you feel lonely,

        whenever you just want to smile...

        Come back here.

        ❤️
    </p>

    <button id="enterBtn">
        Enter Our World 🌙
    </button>
